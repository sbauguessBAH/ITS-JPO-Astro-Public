<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">TRB 2026 booth invitation graphic</title>
  <desc id="desc">A stylized booth invitation card for the ITS JPO toolkit.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d3b66" />
      <stop offset="100%" stop-color="#1b4965" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="48" fill="url(#bg)" />
  <circle cx="1030" cy="180" r="140" fill="#f2cc8f" opacity="0.18" />
  <circle cx="170" cy="750" r="220" fill="#e0fbfc" opacity="0.12" />
  <rect x="82" y="88" width="190" height="48" rx="24" fill="#f2cc8f" />
  <text x="112" y="121" fill="#0d3b66" font-family="Georgia, serif" font-size="28" font-weight="700">TRB 2026</text>
  <text x="82" y="244" fill="#ffffff" font-family="Georgia, serif" font-size="72" font-weight="700">Visit the ITS JPO Booth</text>
  <text x="82" y="326" fill="#d8eff5" font-family="Arial, sans-serif" font-size="30">Use this graphic for social posts, stakeholder outreach, and conference reminders.</text>
  <rect x="82" y="392" width="494" height="284" rx="34" fill="#ffffff" opacity="0.09" stroke="#d8eff5" stroke-width="3" />
  <text x="122" y="462" fill="#f2cc8f" font-family="Arial, sans-serif" font-size="22" letter-spacing="3">MEDIA KIT HIGHLIGHT</text>
  <text x="122" y="530" fill="#ffffff" font-family="Georgia, serif" font-size="56" font-weight="700">Booth Invitation</text>
  <text x="122" y="590" fill="#d8eff5" font-family="Arial, sans-serif" font-size="30">TRB-ready artwork with booth and event callouts.</text>
  <rect x="720" y="204" width="372" height="474" rx="38" fill="#f2cc8f" />
  <rect x="756" y="240" width="300" height="182" rx="24" fill="#0d3b66" />
  <text x="805" y="328" fill="#ffffff" font-family="Georgia, serif" font-size="54" font-weight="700">ITS JPO</text>
  <text x="795" y="388" fill="#d8eff5" font-family="Arial, sans-serif" font-size="24">Transportation Research Board</text>
  <text x="780" y="505" fill="#0d3b66" font-family="Arial, sans-serif" font-size="22" letter-spacing="3">USE FOR</text>
  <text x="780" y="556" fill="#0d3b66" font-family="Georgia, serif" font-size="38" font-weight="700">Conference outreach</text>
  <text x="780" y="607" fill="#0d3b66" font-family="Georgia, serif" font-size="38" font-weight="700">Booth reminders</text>
  <text x="780" y="658" fill="#0d3b66" font-family="Georgia, serif" font-size="38" font-weight="700">Media promotion</text>
  <text x="82" y="804" fill="#d8eff5" font-family="Arial, sans-serif" font-size="24">Intended for rapid download and repurposing across social and event channels.</text>
</svg>