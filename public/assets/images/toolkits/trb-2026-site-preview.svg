  <text x="162" y="258" fill="#f2cc8f" font-family="Arial, sans-serif" font-size="24" letter-spacing="4">ITS JPO AT TRB</text>
  <text x="162" y="338" fill="#ffffff" font-family="Georgia, serif" font-size="68" font-weight="700">Conference activities, booth details,</text>
  <text x="162" y="408" fill="#ffffff" font-family="Georgia, serif" font-size="68" font-weight="700">and media-ready resources</text>
