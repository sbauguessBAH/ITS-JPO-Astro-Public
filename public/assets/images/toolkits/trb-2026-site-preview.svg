<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">ITS JPO TRB site preview</title>
  <desc id="desc">An illustrated browser-style preview for the TRB toolkit call to action.</desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6f4ef" />
      <stop offset="100%" stop-color="#dfe7ef" />
    </linearGradient>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d3b66" />
      <stop offset="100%" stop-color="#1b4965" />
