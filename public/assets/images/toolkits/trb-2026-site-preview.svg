  <text x="150" y="688" fill="#243b53" font-family="Arial, sans-serif" font-size="28">Keep booth logistics and sessions in one place.</text>
  <rect x="590" y="506" width="422" height="320" rx="28" fill="url(#page)" stroke="#d9e2ec" stroke-width="3" />
  <text x="628" y="570" fill="#0d3b66" font-family="Arial, sans-serif" font-size="24" letter-spacing="3">MEDIA</text>
