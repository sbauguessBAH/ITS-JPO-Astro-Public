  <rect x="126" y="438" width="276" height="250" rx="28" fill="#0d3b66" />
  <text x="164" y="494" fill="#f2cc8f" font-family="Arial, sans-serif" font-size="20" letter-spacing="3">DAY 1</text>
  <text x="164" y="556" fill="#ffffff" font-family="Georgia, serif" font-size="36" font-weight="700">Booth hours</text>
  <text x="164" y="608" fill="#d8eff5" font-family="Arial, sans-serif" font-size="24">Share exhibit floor availability</text>
  <rect x="462" y="438" width="276" height="250" rx="28" fill="#1b4965" />
  <text x="500" y="494" fill="#f2cc8f" font-family="Arial, sans-serif" font-size="20" letter-spacing="3">DAY 2</text>
  <text x="500" y="556" fill="#ffffff" font-family="Georgia, serif" font-size="36" font-weight="700">Session posts</text>
  <text x="500" y="608" fill="#d8eff5" font-family="Arial, sans-serif" font-size="24">Promote key research moments</text>
