  <title id="title">TRB 2026 schedule overview graphic</title>
  <desc id="desc">A stylized agenda-style card for TRB schedule promotion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4f1de" />
      <stop offset="100%" stop-color="#d9e2ec" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="48" fill="url(#bg)" />
  <rect x="78" y="78" width="1044" height="744" rx="42" fill="#ffffff" stroke="#0d3b66" stroke-width="4" />
